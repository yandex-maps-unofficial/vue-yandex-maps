name: Code check

on:
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: install node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
      - uses: ./.github/actions/codecheck
  test-vue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: install node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
      - uses: ./.github/actions/test
        with:
          type: vue
  test-nuxt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: install node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 24.18.0
      - uses: ./.github/actions/test
        with:
          type: nuxt
